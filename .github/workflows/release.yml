name: Build And Release Installers

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: App version in x.x.x format
        required: true
        type: string
      target_platform:
        description: Which installer set to build and release
        required: true
        type: choice
        options:
          - all
          - windows
          - mac
          - linux

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Build selected matrix
        id: set-matrix
        shell: bash
        run: |
          case "${{ github.event.inputs.target_platform }}" in
            windows)
              matrix='{"include":[{"os":"windows-latest","platform":"windows","label":"Windows","build_command":"pnpm dist:win","artifact_name":"windows-installers-unsigned","artifact_glob":"release/*.exe"}]}'
              ;;
            mac)
              matrix='{"include":[{"os":"macos-latest","platform":"mac","label":"macOS","build_command":"pnpm dist:mac","artifact_name":"macos-installers","artifact_glob":"release/*.dmg\nrelease/*.zip"}]}'
              ;;
            linux)
              matrix='{"include":[{"os":"ubuntu-latest","platform":"linux","label":"Debian","build_command":"pnpm dist:linux","artifact_name":"linux-installers","artifact_glob":"release/*.deb\nrelease/*.AppImage"}]}'
              ;;
            all)
              matrix='{"include":[{"os":"windows-latest","platform":"windows","label":"Windows","build_command":"pnpm dist:win","artifact_name":"windows-installers-unsigned","artifact_glob":"release/*.exe"},{"os":"macos-latest","platform":"mac","label":"macOS","build_command":"pnpm dist:mac","artifact_name":"macos-installers","artifact_glob":"release/*.dmg\nrelease/*.zip"},{"os":"ubuntu-latest","platform":"linux","label":"Debian","build_command":"pnpm dist:linux","artifact_name":"linux-installers","artifact_glob":"release/*.deb\nrelease/*.AppImage"}]}'
              ;;
            *)
              echo "Unsupported target_platform=${{ github.event.inputs.target_platform }}" >&2
              exit 1
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    env:
      CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK_MAC || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD_MAC || '' }}
      APPLE_API_KEY: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY || '' }}
      APPLE_API_KEY_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY_ID || '' }}
      APPLE_API_ISSUER: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Validate version input
        shell: bash
        run: |
          if [[ ! "${{ github.event.inputs.app_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected app_version in x.x.x format" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set package version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const file='package.json'; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version='${{ github.event.inputs.app_version }}'; fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate macOS signing secrets
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"

      - name: Build installers
        run: ${{ matrix.build_command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  sign_windows:
    name: Sign Windows installer
    if: github.event.inputs.target_platform == 'windows' || github.event.inputs.target_platform == 'all'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Validate SSL.com eSigner secrets
        shell: bash
        run: |
          [ -n "${{ secrets.ES_USERNAME }}" ] || { echo "Missing secret: ES_USERNAME" >&2; exit 1; }
          [ -n "${{ secrets.ES_PASSWORD }}" ] || { echo "Missing secret: ES_PASSWORD" >&2; exit 1; }
          [ -n "${{ secrets.CREDENTIAL_ID }}" ] || { echo "Missing secret: CREDENTIAL_ID" >&2; exit 1; }
          [ -n "${{ secrets.ES_TOTP_SECRET }}" ] || { echo "Missing secret: ES_TOTP_SECRET" >&2; exit 1; }

      - name: Download unsigned Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installers-unsigned
          path: unsigned-windows

      - name: Locate unsigned Windows installer
        id: locate-installer
        shell: bash
        run: |
          shopt -s nullglob
          files=(unsigned-windows/*.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No unsigned Windows installer found in unsigned-windows/" >&2
            exit 1
          fi
          echo "installer_path=${files[0]}" >> "$GITHUB_OUTPUT"
          echo "installer_name=$(basename "${files[0]}")" >> "$GITHUB_OUTPUT"

      - name: Normalize Windows installer filename
        id: normalize-installer
        shell: bash
        run: |
          mkdir -p signing-input
          cp "${{ steps.locate-installer.outputs.installer_path }}" signing-input/windows-installer.exe
          echo "normalized_path=signing-input/windows-installer.exe" >> "$GITHUB_OUTPUT"

      - name: Prepare signed output directory
        shell: bash
        run: mkdir -p release-signed

      - name: Sign Windows installer with SSL.com eSigner
        uses: sslcom/actions-codesigner@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/${{ steps.normalize-installer.outputs.normalized_path }}
          output_path: ${{ github.workspace }}/release-signed

      - name: Inspect signed output
        shell: bash
        run: |
          find release-signed -maxdepth 2 -type f || true

      - name: Restore signed installer filename
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-signed/*.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No signed Windows installer found in release-signed/" >&2
            exit 1
          fi
          mv "${files[0]}" "release-signed/${{ steps.locate-installer.outputs.installer_name }}"

      - name: Upload signed Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: release-signed/**/*.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        needs.sign_windows.result == 'success' ||
        needs.sign_windows.result == 'skipped'
      )
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
      - sign_windows

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Validate selected artifacts exist
        shell: bash
        run: |
          shopt -s globstar nullglob
          case "${{ github.event.inputs.target_platform }}" in
            windows)
              files=(dist-artifacts/windows-installers/**/*.exe)
              ;;
            mac)
              files=(dist-artifacts/macos-installers/**/*.dmg dist-artifacts/macos-installers/**/*.zip)
              ;;
            linux)
              files=(dist-artifacts/linux-installers/**/*.deb dist-artifacts/linux-installers/**/*.AppImage)
              ;;
            all)
              files=(
                dist-artifacts/windows-installers/**/*.exe
                dist-artifacts/macos-installers/**/*.dmg
                dist-artifacts/macos-installers/**/*.zip
                dist-artifacts/linux-installers/**/*.deb
                dist-artifacts/linux-installers/**/*.AppImage
              )
              ;;
          esac
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found for target_platform=${{ github.event.inputs.target_platform }}" >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.app_version }}
          name: v${{ github.event.inputs.app_version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ github.event.inputs.target_platform == 'windows' && 'dist-artifacts/windows-installers/**/*.exe' || '' }}
            ${{ github.event.inputs.target_platform == 'mac' && 'dist-artifacts/macos-installers/**/*.dmg' || '' }}
            ${{ github.event.inputs.target_platform == 'mac' && 'dist-artifacts/macos-installers/**/*.zip' || '' }}
            ${{ github.event.inputs.target_platform == 'linux' && 'dist-artifacts/linux-installers/**/*.deb' || '' }}
            ${{ github.event.inputs.target_platform == 'linux' && 'dist-artifacts/linux-installers/**/*.AppImage' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/windows-installers/**/*.exe' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/macos-installers/**/*.dmg' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/macos-installers/**/*.zip' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/linux-installers/**/*.deb' || '' }}
            ${{ github.event.inputs.target_platform == 'all' && 'dist-artifacts/linux-installers/**/*.AppImage' || '' }}
