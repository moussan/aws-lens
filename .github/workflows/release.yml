name: Build And Release Installers

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: App version in x.x.x or x.x.x-preview.n format
        required: true
        type: string
      release_channel:
        description: Which update channel to publish
        required: true
        type: choice
        options:
          - stable
          - preview
      target_platform:
        description: Which installer set to build and release
        required: true
        type: choice
        options:
          - all
          - windows
          - mac
          - linux

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      full_version: ${{ steps.release-meta.outputs.full_version }}
      release_name: ${{ steps.release-meta.outputs.release_name }}
      is_prerelease: ${{ steps.release-meta.outputs.is_prerelease }}

    steps:
      - name: Compute release metadata
        id: release-meta
        shell: bash
        run: |
          raw_version="${{ github.event.inputs.app_version }}"
          channel="${{ github.event.inputs.release_channel }}"

          if [[ "$channel" == "stable" ]]; then
            if [[ ! "$raw_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Stable releases require app_version in x.x.x format" >&2
              exit 1
            fi
            full_version="$raw_version"
            release_name="v$full_version"
            is_prerelease="false"
          else
            if [[ "$raw_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
              full_version="$raw_version"
            elif [[ "$raw_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              full_version="${raw_version}-preview.1"
            else
              echo "Preview releases require x.x.x or x.x.x-preview.n format" >&2
              exit 1
            fi
            release_name="[preview] v$full_version"
            is_prerelease="true"
          fi

          echo "full_version=$full_version" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Build selected matrix
        id: set-matrix
        shell: bash
        run: |
          case "${{ github.event.inputs.target_platform }}" in
            windows)
              matrix='{"include":[{"os":"windows-latest","platform":"windows","label":"Windows","build_command":"pnpm dist:win","artifact_name":"windows-installers","artifact_glob":"release/**"}]}'
              ;;
            mac)
              matrix='{"include":[{"os":"macos-latest","platform":"mac","label":"macOS","build_command":"pnpm dist:mac","artifact_name":"macos-installers","artifact_glob":"release/**"}]}'
              ;;
            linux)
              matrix='{"include":[{"os":"ubuntu-latest","platform":"linux","label":"Debian","build_command":"pnpm dist:linux","artifact_name":"linux-installers","artifact_glob":"release/**"}]}'
              ;;
            all)
              matrix='{"include":[{"os":"windows-latest","platform":"windows","label":"Windows","build_command":"pnpm dist:win","artifact_name":"windows-installers","artifact_glob":"release/**"},{"os":"macos-latest","platform":"mac","label":"macOS","build_command":"pnpm dist:mac","artifact_name":"macos-installers","artifact_glob":"release/**"},{"os":"ubuntu-latest","platform":"linux","label":"Debian","build_command":"pnpm dist:linux","artifact_name":"linux-installers","artifact_glob":"release/**"}]}'
              ;;
            *)
              echo "Unsupported target_platform=${{ github.event.inputs.target_platform }}" >&2
              exit 1
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    env:
      CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK_MAC || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD_MAC || '' }}
      APPLE_API_KEY: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY || '' }}
      APPLE_API_KEY_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY_ID || '' }}
      APPLE_API_ISSUER: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
      AWS_LENS_BUILD_HASH: ${{ github.sha }}
      AWS_LENS_RELEASE_CHANNEL: ${{ github.event.inputs.release_channel }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Validate version input
        shell: bash
        run: |
          if [[ -z "${{ needs.prepare.outputs.full_version }}" ]]; then
            echo "Expected a non-empty computed full_version" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set package version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const file='package.json'; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version='${{ needs.prepare.outputs.full_version }}'; fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate macOS signing secrets
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"

      - name: Materialize App Store Connect API key file
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          if printf '%s' "$APPLE_API_KEY_SECRET" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s' "$APPLE_API_KEY_SECRET" > "$key_path"
          else
            printf '%s' "$APPLE_API_KEY_SECRET" | base64 --decode > "$key_path"
          fi
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Validate App Store Connect API key file
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          grep -q 'BEGIN PRIVATE KEY' "$APPLE_API_KEY"
          openssl pkey -in "$APPLE_API_KEY" -inform PEM -noout

      - name: Validate SSL.com eSigner CKA secrets
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          [ -n "${{ secrets.ES_USERNAME }}" ] || { echo "Missing secret: ES_USERNAME" >&2; exit 1; }
          [ -n "${{ secrets.ES_PASSWORD }}" ] || { echo "Missing secret: ES_PASSWORD" >&2; exit 1; }
          [ -n "${{ secrets.ES_TOTP_SECRET }}" ] || { echo "Missing secret: ES_TOTP_SECRET" >&2; exit 1; }
          [ -n "${{ secrets.CREDENTIAL_ID }}" ] || { echo "Missing secret: CREDENTIAL_ID" >&2; exit 1; }

      - name: Install SSL.com CodeSignTool
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $zip = Join-Path $env:RUNNER_TEMP 'CodeSignTool.zip'
          $extract = Join-Path $env:GITHUB_WORKSPACE 'tools'
          Invoke-WebRequest -OutFile $zip 'https://github.com/SSLcom/CodeSignTool/releases/latest/download/CodeSignTool-v1.3.2-windows.zip'
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $tool = Get-ChildItem -Path $extract -Recurse -Filter CodeSignTool.bat | Select-Object -First 1
          if (-not $tool) {
            throw 'CodeSignTool.bat was not found after extracting the archive.'
          }
          "SSLCOM_CODESIGNTOOL_PATH=$($tool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows installers with code signing
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
          CREDENTIAL_ID: ${{ secrets.CREDENTIAL_ID }}
        run: |
          pnpm dist:win

      - name: Build non-Windows installers
        if: matrix.os != 'windows-latest'
        run: ${{ matrix.build_command }}

      - name: Verify Windows installer signature
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter *.exe -File | Select-Object -First 1
          if (-not $installer) {
            throw 'No Windows installer .exe found in release/.'
          }
          $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
          $signature | Format-List *
          if ($signature.Status -ne 'Valid') {
            throw "Expected a valid Authenticode signature, got: $($signature.Status)"
          }

      - name: Validate updater metadata exists
        shell: bash
        run: |
          shopt -s nullglob
          metadata=(release/*.yml release/*.yaml release/*.blockmap)
          if [ ${#metadata[@]} -eq 0 ]; then
            echo "Expected updater metadata files in release/ but none were found." >&2
            exit 1
          fi

      - name: Generate release manifest and checksums
        shell: bash
        run: |
          node scripts/release-manifest.mjs generate \
            release \
            "${{ github.event.inputs.release_channel }}" \
            "${{ matrix.platform }}" \
            "${{ needs.prepare.outputs.full_version }}" \
            "${{ github.sha }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: |
      always() &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Validate selected artifacts exist
        shell: bash
        run: |
          shopt -s globstar nullglob
          case "${{ github.event.inputs.target_platform }}" in
            windows)
              files=(dist-artifacts/windows-installers/**/*.exe)
              ;;
            mac)
              files=(dist-artifacts/macos-installers/**/*.dmg dist-artifacts/macos-installers/**/*.zip)
              ;;
            linux)
              files=(dist-artifacts/linux-installers/**/*.deb dist-artifacts/linux-installers/**/*.AppImage)
              ;;
            all)
              files=(
                dist-artifacts/windows-installers/**/*.exe
                dist-artifacts/macos-installers/**/*.dmg
                dist-artifacts/macos-installers/**/*.zip
                dist-artifacts/linux-installers/**/*.deb
                dist-artifacts/linux-installers/**/*.AppImage
              )
              ;;
          esac
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found for target_platform=${{ github.event.inputs.target_platform }}" >&2
            exit 1
          fi

      - name: Verify artifact checksums and manifest
        shell: bash
        run: |
          node scripts/release-manifest.mjs verify-tree dist-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.full_version }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.zip
            dist-artifacts/**/*.deb
            dist-artifacts/**/*.AppImage
            dist-artifacts/**/*.yml
            dist-artifacts/**/*.yaml
            dist-artifacts/**/*.blockmap
            dist-artifacts/**/release-manifest-*.json
            dist-artifacts/**/release-checksums-*.txt

      - name: Smoke verify published release assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: v${{ needs.prepare.outputs.full_version }}
          EXPECTED_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function collectManifestFiles(rootDir) {
              const entries = fs.readdirSync(rootDir, { withFileTypes: true });
              const files = [];
              for (const entry of entries) {
                const fullPath = path.join(rootDir, entry.name);
                if (entry.isDirectory()) {
                  files.push(...collectManifestFiles(fullPath));
                  continue;
                }
                if (entry.isFile() && entry.name === 'release-manifest.json') {
                  files.push(fullPath);
                }
              }
              return files;
            }

            const manifestPaths = collectManifestFiles(path.join(process.env.GITHUB_WORKSPACE, 'dist-artifacts'))
              .filter((filePath) => /^release-manifest-.*\.json$/u.test(path.basename(filePath)));
            if (manifestPaths.length === 0) {
              core.setFailed('No release manifest files found after publish.');
              return;
            }

            const expectedAssetNames = new Set();
            for (const manifestPath of manifestPaths) {
              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              for (const file of manifest.files) {
                expectedAssetNames.add(path.basename(file.path));
              }
              expectedAssetNames.add(path.basename(manifestPath));
              expectedAssetNames.add(`release-checksums-${manifest.platform}.txt`);
            }

            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const assetNames = new Set(release.data.assets.map((asset) => asset.name));

            for (const expectedName of expectedAssetNames) {
              if (!assetNames.has(expectedName)) {
                core.setFailed(`Published release is missing asset: ${expectedName}`);
                return;
              }
            }

            const expectedPrerelease = process.env.EXPECTED_PRERELEASE === 'true';
            if (release.data.prerelease !== expectedPrerelease) {
              core.setFailed(`Expected prerelease=${expectedPrerelease} but release was prerelease=${release.data.prerelease}`);
              return;
            }

            core.info(`Verified ${expectedAssetNames.size} expected assets on release ${tag}.`);

  cleanup:
    name: Cleanup workflow artifacts
    if: always()
    runs-on: ubuntu-latest
    needs:
      - build
      - publish

    steps:
      - name: Delete current run artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const artifactNames = new Set([
              'windows-installers',
              'macos-installers',
              'linux-installers',
            ]);

            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id, per_page: 100 }
            );

            for (const artifact of artifacts) {
              if (!artifactNames.has(artifact.name)) continue;
              core.info(`Deleting artifact: ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
